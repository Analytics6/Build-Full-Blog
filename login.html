<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login | Edukron</title>

  <link rel="stylesheet" href="css/style.css">

  <style>

    .login-page {

      min-height: 100vh;

      display: flex;

      align-items: center;

      justify-content: center;

      background: #ffffff;

      padding: 2rem;

    }

    .login-card {

      width: 100%;

      max-width: 400px;

      padding: 2.5rem;

      border: 1px solid #e2e8f0;

      border-radius: 16px;

      background: #ffffff;

      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);

    }

    .login-card h1 {

      font-size: 1.5rem;

      font-weight: 700;

      color: #0f172a;

      margin-bottom: 0.5rem;

      text-align: center;

    }

    .login-card p {

      color: #64748b;

      font-size: 0.875rem;

      text-align: center;

      margin-bottom: 2rem;

    }

    .login-logo {

      display: flex;

      justify-content: center;

      margin-bottom: 1.5rem;

    }

    .form-group {

      margin-bottom: 1.25rem;

    }

    .form-group label {

      display: block;

      font-size: 0.875rem;

      font-weight: 500;

      color: #334155;

      margin-bottom: 0.5rem;

    }

    .form-group input {

      width: 100%;

      padding: 0.625rem 0.875rem;

      font-size: 0.9375rem;

      border: 1px solid #e2e8f0;

      border-radius: 8px;

      outline: none;

      transition: border-color 0.15s;

    }

    .form-group input:focus {

      border-color: #0070c4;

      box-shadow: 0 0 0 3px rgba(0, 112, 196, 0.1);

    }

    .login-btn {

      width: 100%;

      padding: 0.75rem;

      font-size: 0.9375rem;

      font-weight: 500;

      color: #ffffff;

      background: #0070c4;

      border: none;

      border-radius: 8px;

      cursor: pointer;

      transition: background 0.15s;

    }

    .login-btn:hover {

      background: #0159a0;

    }

    .error-msg {

      display: none;

      margin-top: 1rem;

      padding: 0.75rem;

      font-size: 0.875rem;

      color: #b91c1c;

      background: #fef2f2;

      border: 1px solid #fecaca;

      border-radius: 8px;

      text-align: center;

    }

    .error-msg.show {

      display: block;

    }

    .login-hint {

      margin-top: 1.5rem;

      font-size: 0.75rem;

      color: #94a3b8;

      text-align: center;

      line-height: 1.5;

    }

  </style>

</head>

<body>

  <div class="login-page">

    <div class="login-card">

      <div class="login-logo">

        <span class="logo-icon" style="width:40px;height:40px;font-size:1rem;border-radius:10px;">E</span>

      </div>

      <h1>Welcome to Edukron</h1>

      <p>Sign in to access the blog and learning paths</p>



      <form id="loginForm">

        <div class="form-group">

          <label for="username">Email</label>

          <input type="text" id="username" name="username" required autocomplete="username" placeholder="Enter your email">

        </div>

        <div class="form-group">

          <label for="password">Password</label>

          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter password">

        </div>

        <button type="submit" class="login-btn">Sign In</button>

        <div id="error" class="error-msg">Invalid email or password</div>

      </form>



      <p class="login-hint">Sign in with your registered email and password.</p>

    </div>

  </div>



  <script src="js/auth.js" data-page="login"></script>

</body>

</html>
